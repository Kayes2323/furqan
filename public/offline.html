<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FURQAN — অফলাইন</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Hind Siliguri', sans-serif;
    background: #FAF7F0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    text-align: center;
  }
  .icon { width: 100px; height: 100px; border-radius: 24px; margin-bottom: 24px; box-shadow: 0 8px 32px rgba(26,95,122,0.2); }
  .title { font-size: 24px; font-weight: 700; color: #1A1A2E; margin-bottom: 8px; }
  .sub { font-size: 14px; color: #6B7280; line-height: 1.6; margin-bottom: 32px; }
  .card {
    background: white; border-radius: 16px;
    padding: 20px; margin-bottom: 16px;
    border: 1px solid #E8E0D0;
    box-shadow: 0 2px 12px rgba(26,95,122,0.08);
    width: 100%; max-width: 320px;
  }
  .card-icon { font-size: 28px; margin-bottom: 8px; }
  .card-title { font-size: 14px; font-weight: 700; color: #1A1A2E; margin-bottom: 4px; }
  .card-sub { font-size: 12px; color: #6B7280; }
  .btn {
    background: linear-gradient(135deg, #1A5F7A, #1B7A4A);
    color: white; border: none;
    padding: 14px 32px; border-radius: 16px;
    font-size: 15px; font-weight: 700;
    font-family: 'Hind Siliguri', sans-serif;
    cursor: pointer; margin-top: 8px;
    box-shadow: 0 4px 16px rgba(26,95,122,0.3);
  }
  .arabic {
    font-family: 'Amiri', serif;
    font-size: 22px; direction: rtl;
    color: #1A5F7A; margin-bottom: 8px;
  }
</style>
</head>
<body>
  <img src="/icon-192.png" class="icon" alt="FURQAN">
  <div class="title">ইন্টারনেট নেই</div>
  <div class="sub">কিন্তু আল্লাহর কালাম সবসময় তোমার সাথে</div>

  <div class="arabic">وَإِذَا سَأَلَكَ عِبَادِي عَنِّي فَإِنِّي قَرِيبٌ</div>
  <div class="sub" style="margin-bottom: 24px; font-size: 13px;">"আমার বান্দারা যখন আমার সম্পর্কে জিজ্ঞেস করে — আমি তো কাছেই আছি" — সূরা বাকারা ২:১৮৬</div>

  <div class="card">
    <div class="card-icon">📖</div>
    <div class="card-title">তাফসির পড়ো</div>
    <div class="card-sub">আগে দেখা সূরাগুলো offline এ পড়া যাবে</div>
  </div>

  <div class="card">
    <div class="card-icon">🔬</div>
    <div class="card-title">গবেষণা পড়ো</div>
    <div class="card-sub">Cache করা articles offline এ available</div>
  </div>

  <button class="btn" onclick="window.location.reload()">🔄 আবার চেষ্টা করো</button>
</body>
</html>
